{{ define "article" }}
<h1>{{.Title}}</h1>
<hr />
<ul id="posts">
  {{ range $post := .Posts }}
  <li>
    <a href="/{{ $post.Path }}">
      <span class="post-date">{{ $post.Date.Format "Jan 02, 2006" }}</span>
      <span>&mdash;</span>
      <span>{{ $post.Title }}</span>
    </a>
  </li>
  {{ end }}
</ul>
{{ end }}
