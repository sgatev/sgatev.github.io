{{ block "layout" . }}
<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Stanislav Gatev's blog" />
    <title>{{ .Title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="layout.css" />
  </head>
  <body>
    <button id="dark-mode-toggle" onClick="toggleDarkMode()">◐&#xFE0E;</button>
    <main>
      <article>{{ template "article" . }}</article>
    </main>
    <footer>
      <hr />
      © {{ .CurrentYear }} •
      <a href="https://sgatev.github.io">Stanislav Gatev</a>
      •
      <a href="https://creativecommons.org/licenses/by/4.0/">
        Creative Commons Attribution License
      </a>
    </footer>
    <script src="dark-mode.js"></script>
  </body>
</html>
{{ end }}
